# Minimal OTEL_CONFIG_FILE fixture used by Otel.SDK.ApplicationTest.
# Uses `otlp_http` exporters everywhere — the only exporter the SDK
# ships. Boot succeeds without a collector running because OTLP HTTP
# init/1 only stores config; network calls happen at export time
# (which the test does not trigger). Sampler block is silently
# ignored (hardcoded parentbased_always_on); kept here only to
# exercise the full YAML shape.
file_format: "1.0"
resource:
  attributes:
    - name: service.name
      value: otel_config_wiring_test
tracer_provider:
  processors:
    - batch:
        exporter:
          otlp_http:
meter_provider:
  readers:
    - periodic:
        exporter:
          otlp_http:
logger_provider:
  processors:
    - batch:
        exporter:
          otlp_http:
