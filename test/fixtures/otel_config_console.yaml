# Minimal OTEL_CONFIG_FILE fixture used by Otel.SDK.ApplicationTest.
# Uses `console` exporters everywhere so the supervised SDK boot
# during the test never opens a network socket to a missing OTLP
# collector. Sampler block is silently ignored (hardcoded
# parentbased_always_on); kept here only to exercise the full YAML
# shape.
file_format: "1.0"
resource:
  attributes:
    - name: service.name
      value: otel_config_wiring_test
tracer_provider:
  processors:
    - batch:
        exporter:
          console:
meter_provider:
  readers:
    - periodic:
        exporter:
          console:
logger_provider:
  processors:
    - batch:
        exporter:
          console:
