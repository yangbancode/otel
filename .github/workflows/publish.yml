name: Publish

on:
  release:
    types: [published]

env:
  MIX_ENV: test
  OTP_VERSION: "26.2"
  ELIXIR_VERSION: "1.18.4"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to hex.pm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Parse release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^([a-z_]+)-v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "::error::Tag '$TAG' does not match <package>-v<version> pattern"
            exit 1
          fi
          PACKAGE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed: package=$PACKAGE, version=$VERSION"

      - name: Verify app directory exists
        run: |
          APP_DIR="apps/${{ steps.tag.outputs.package }}"
          if [ ! -d "$APP_DIR" ]; then
            echo "::error::App directory $APP_DIR does not exist"
            exit 1
          fi

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v5
        with:
          path: _build/dev/dialyxir_*.plt*
          key: plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify mix.exs version matches tag
        working-directory: apps/${{ steps.tag.outputs.package }}
        run: |
          MIX_VERSION=$(mix eval 'IO.puts Mix.Project.config[:version]' | tail -1)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$MIX_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match mix.exs version $MIX_VERSION"
            exit 1
          fi
          echo "Version matches: $MIX_VERSION"

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Format
        run: mix format --check-formatted

      - name: Test
        run: mix test --warnings-as-errors --cover

      - name: Credo
        run: mix credo --strict

      - name: Dialyzer
        run: mix dialyzer

      - name: Publish to hex.pm
        working-directory: apps/${{ steps.tag.outputs.package }}
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
