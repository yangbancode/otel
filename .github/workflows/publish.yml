name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. otel_semantic_conventions-v0.1.0)"
        required: true

env:
  OTP_VERSION: "26.2"
  ELIXIR_VERSION: "1.18.4"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to hex.pm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve package and version from tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PACKAGE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          if [ ! -d "apps/$PACKAGE" ] || [ "$TAG" != "${PACKAGE}-v${VERSION}" ]; then
            echo "::error::Tag '$TAG' must be <package>-v<version> where <package> matches an app in apps/"
            exit 1
          fi
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: apps/$PACKAGE version $VERSION"

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify mix.exs version matches tag
        working-directory: apps/${{ steps.tag.outputs.package }}
        run: |
          MIX_VERSION=$(mix eval 'IO.puts Mix.Project.config[:version]' | tail -1)
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$MIX_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match mix.exs version $MIX_VERSION"
            exit 1
          fi
          echo "Version matches: $MIX_VERSION"

      - name: Publish to hex.pm
        working-directory: apps/${{ steps.tag.outputs.package }}
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
