name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  OTP_VERSION: "26.2.5.20"
  ELIXIR_VERSION: "1.18.4"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Verify release tag matches mix.exs @version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep -oE '@version "[^"]+"' mix.exs | sed -E 's/@version "([^"]+)"/\1/')
          if [ "$tag" != "$version" ]; then
            echo "::error::Release tag ($tag) does not match mix.exs @version ($version)"
            exit 1
          fi

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Publish package + docs
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
