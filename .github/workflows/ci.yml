name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  ci:
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported combination (OTP 25 floor from :public_key.cacerts_get/0,
          # Elixir 1.15 floor from ex_doc dev dep)
          - otp: "25.3"
            elixir: "1.15.8"
          # Current development pin (.mise.toml)
          - otp: "28.4"
            elixir: "1.19.5"

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v5
        with:
          path: _build/dev/dialyxir_*.plt*
          key: plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Format
        run: mix format --check-formatted

      - name: Test
        run: mix test --warnings-as-errors --cover

      - name: Credo
        run: mix credo --strict

      - name: Dialyzer
        run: mix dialyzer
