params:
  stability: "stable"

templates:
  - pattern: semantic_attributes.ex.j2
    filter: >
      .groups
      | map(select(.type == "attribute_group"))
      | map(select(.id | startswith("registry.")))
      | map({ id: .id, group_id: .id | split(".") | .[1], attributes: .attributes})
      | map(select([.attributes[] | select(.stability == $stability)] | any))
      | group_by(.group_id)
      | map({
          id: .[0].group_id,
          attributes: [.[].attributes[] | select(.stability == $stability)]
            | sort_by(.id),
          output: $output + "/otel/sem_conv/attributes/"
        })
      | map(select(.attributes | length > 0))
    application_mode: each
  - pattern: semantic_metrics.ex.j2
    filter: >
      .groups
      | map(select(.type == "metric"))
      | map(select(.stability == $stability))
      | map({ id: .id, group_id: .id | split(".") | .[1], brief, unit, stability, instrument, metric_name, note})
      | group_by(.group_id)
      | map({
          id: .[0].group_id,
          metrics: . | sort_by(.metric_name),
          output: $output + "/otel/sem_conv/metrics/"
        })
      | map(select(.metrics | length > 0))
    application_mode: each

text_maps:
  elixir_types:
    "int": "integer()"
    "int[]": "[integer()]"
    "double": "float()"
    "double[]": "[float()]"
    "boolean": "boolean()"
    "boolean[]": "[boolean()]"
    "string": "String.t()"
    "string[]": "[String.t()]"
    "template[int]": "integer()"
    "template[double]": "float()"
    "template[boolean]": "boolean()"
    "template[string]": "String.t()"
    "template[string[]]": "[String.t()]"
    "template[int[]]": "[integer()]"
    "template[double[]]": "[float()]"
    "template[boolean[]]": "[boolean()]"

acronyms: ["iOS", "HTTP", "API", "SDK", "CLI", "URL", "JSON", "XML", "HTML", "TLS", "RPC", "OS", "OCI", "GCP", "FAAS", "DNS", "DB", "AWS", "S3", "K8S", "JVM", "AspNetCore", "DotNet", "SignalR"]
