# Local Grafana Stack (LGTM) for testing OTel exports.
#
# https://github.com/grafana/docker-otel-lgtm
#
# Run:
#
#   docker compose up -d
#
# Then point your SDK at http://localhost:4318 (the default) and
# open Grafana at http://localhost:3000 (admin / admin).

services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.26.0
    container_name: otel-lgtm
    ports:
      - "3000:3000" # Grafana UI
      - "4318:4318" # OTLP HTTP
      - "3100:3100" # Loki (logs query API)
      - "3200:3200" # Tempo (trace query API)
      - "9090:9090" # Prometheus / Mimir (metrics query API)
